# ============================================================
#  Hybrid IDS — Signature Rules
#  Add / modify rules here without touching any Python code.
#
#  Each rule:
#    id         : unique string identifier
#    name       : human-readable name
#    category   : DoS | Probe | Brute-Force | Exfiltration | Misc
#    severity   : LOW | MEDIUM | HIGH | CRITICAL
#    confidence : 0.0 – 1.0  (how sure we are when rule fires)
#    conditions : list of { field, op, value }
#                 ALL conditions must be true (AND logic)
#                 ops: > >= < <= == !=
# ============================================================

rules:
  # ═══════════════════════════════════════════════════════════════════════════
  # NETWORK ANOMALY DETECTION (Basic)
  # ═══════════════════════════════════════════════════════════════════════════

  - id: NET-001
    name: "Unusual Port Traffic"
    category: Anomaly
    severity: LOW
    confidence: 0.60
    conditions:
      - { field: dst_port, op: ">", value: 49152 }
      - { field: pkt_count, op: ">", value: 50 }

  - id: NET-002
    name: "High Byte Transfer Rate"
    category: Anomaly
    severity: MEDIUM
    confidence: 0.70
    conditions:
      - { field: flow_bytes_per_sec, op: ">", value: 10000000 }
      - { field: duration, op: ">", value: 60 }

  - id: NET-003
    name: "Long Duration Connection"
    category: Anomaly
    severity: LOW
    confidence: 0.65
    conditions:
      - { field: duration, op: ">", value: 3600000 }
      - { field: byte_count, op: "<", value: 1000 }

  - id: NET-004
    name: "Tiny Packet Flood"
    category: DoS
    severity: MEDIUM
    confidence: 0.75
    conditions:
      - { field: avg_pkt_size, op: "<", value: 100 }
      - { field: pkt_count, op: ">", value: 500 }
      - { field: flow_pkts_per_sec, op: ">", value: 200 }

  - id: NET-005
    name: "Asymmetric Traffic Pattern"
    category: Anomaly
    severity: MEDIUM
    confidence: 0.72
    conditions:
      - { field: fwd_pkt_count, op: ">", value: 100 }
      - { field: bwd_pkt_count, op: "<", value: 5 }
      - { field: duration, op: ">", value: 1000 }

  # ═══════════════════════════════════════════════════════════════════════════
  # PROTOCOL FLAG ANOMALIES (Basic)
  # ═══════════════════════════════════════════════════════════════════════════

  - id: PROTO-001
    name: "TCP Flag Combination Anomaly (SYN+FIN)"
    category: Anomaly
    severity: HIGH
    confidence: 0.88
    conditions:
      - { field: syn_flag_count, op: ">", value: 0 }
      - { field: fin_flag_count, op: ">", value: 0 }
      - { field: protocol_type, op: "==", value: 6 }

  - id: PROTO-002
    name: "TCP Flag Combination Anomaly (SYN+RST)"
    category: Anomaly
    severity: HIGH
    confidence: 0.88
    conditions:
      - { field: syn_flag_count, op: ">", value: 0 }
      - { field: rst_flag_count, op: ">", value: 0 }
      - { field: protocol_type, op: "==", value: 6 }

  - id: PROTO-003
    name: "TCP Flag Combination Anomaly (FIN+RST)"
    category: Anomaly
    severity: MEDIUM
    confidence: 0.82
    conditions:
      - { field: fin_flag_count, op: ">", value: 0 }
      - { field: rst_flag_count, op: ">", value: 0 }
      - { field: protocol_type, op: "==", value: 6 }

  - id: PROTO-004
    name: "TCP NULL Scan (No Flags Set)"
    category: Probe
    severity: MEDIUM
    confidence: 0.85
    conditions:
      - { field: syn_flag_count, op: "==", value: 0 }
      - { field: ack_flag_count, op: "==", value: 0 }
      - { field: fin_flag_count, op: "==", value: 0 }
      - { field: rst_flag_count, op: "==", value: 0 }
      - { field: psh_flag_count, op: "==", value: 0 }
      - { field: urg_flag_count, op: "==", value: 0 }
      - { field: protocol_type, op: "==", value: 6 }

  - id: PROTO-005
    name: "TCP XMAS Scan (FIN+PSH+URG)"
    category: Probe
    severity: MEDIUM
    confidence: 0.85
    conditions:
      - { field: fin_flag_count, op: ">", value: 0 }
      - { field: psh_flag_count, op: ">", value: 0 }
      - { field: urg_flag_count, op: ">", value: 0 }
      - { field: syn_flag_count, op: "==", value: 0 }
      - { field: protocol_type, op: "==", value: 6 }

  - id: PROTO-006
    name: "ACK Scan"
    category: Probe
    severity: MEDIUM
    confidence: 0.80
    conditions:
      - { field: ack_flag_count, op: ">", value: 5 }
      - { field: syn_flag_count, op: "==", value: 0 }
      - { field: fin_flag_count, op: "==", value: 0 }
      - { field: protocol_type, op: "==", value: 6 }

  - id: PROTO-007
    name: "Invalid TCP Window Size"
    category: Anomaly
    severity: LOW
    confidence: 0.68
    conditions:
      - { field: window_size, op: "==", value: 0 }
      - { field: syn_flag_count, op: "==", value: 0 }
      - { field: protocol_type, op: "==", value: 6 }

  # ═══════════════════════════════════════════════════════════════════════════
  # OPEN REDIRECT (Basic)
  # ═══════════════════════════════════════════════════════════════════════════

  - id: REDIRECT-001
    name: "Open Redirect via URL Parameter"
    category: Injection
    severity: MEDIUM
    confidence: 0.82
    conditions:
      - { field: url_param_redirect, op: "==", value: true }
      - { field: redirect_external, op: "==", value: true }

  - id: REDIRECT-002
    name: "Open Redirect with Encoded URL"
    category: Injection
    severity: MEDIUM
    confidence: 0.80
    conditions:
      - { field: encoded_redirect, op: "==", value: true }
      - { field: redirect_external, op: "==", value: true }

  # ── DoS / DDoS ─────────────────────────────────────────────────────────────

  - id: DOS-001
    name: "High Volume SYN Flood"
    category: DoS
    severity: CRITICAL
    confidence: 0.95
    conditions:
      - { field: syn_flag_count, op: ">", value: 100 }
      - { field: ack_flag_count, op: "<", value: 5 }
      - { field: flow_pkts_per_sec, op: ">", value: 1000 }

  - id: DOS-002
    name: "UDP Flood"
    category: DoS
    severity: HIGH
    confidence: 0.88
    conditions:
      - { field: protocol_type, op: "==", value: 17 }
      - { field: flow_pkts_per_sec, op: ">", value: 500 }
      - { field: byte_count, op: ">", value: 100000 }

  - id: DOS-003
    name: "ICMP Flood (Ping Flood)"
    category: DoS
    severity: HIGH
    confidence: 0.90
    conditions:
      - { field: protocol_type, op: "==", value: 1 }
      - { field: pkt_count, op: ">", value: 200 }
      - { field: flow_pkts_per_sec, op: ">", value: 300 }

  # ── Port Scanning / Probing ────────────────────────────────────────────────

  - id: PROBE-001
    name: "Port Scan (Low Duration, Many Packets)"
    category: Probe
    severity: MEDIUM
    confidence: 0.82
    conditions:
      - { field: duration, op: "<", value: 500 }
      - { field: pkt_count, op: ">", value: 20 }
      - { field: syn_flag_count, op: ">", value: 10 }
      - { field: ack_flag_count, op: "<", value: 3 }

  - id: PROBE-002
    name: "Stealth Scan (FIN/NULL/XMAS)"
    category: Probe
    severity: HIGH
    confidence: 0.85
    conditions:
      - { field: fin_flag_count, op: ">", value: 5 }
      - { field: syn_flag_count, op: "<", value: 2 }
      - { field: ack_flag_count, op: "<", value: 2 }

  - id: PROBE-003
    name: "Service Version Scan"
    category: Probe
    severity: LOW
    confidence: 0.70
    conditions:
      - { field: pkt_count, op: ">", value: 10 }
      - { field: byte_count, op: "<", value: 500 }
      - { field: duration, op: "<", value: 200 }

  # ── Brute Force ────────────────────────────────────────────────────────────

  - id: BRUTE-001
    name: "SSH Brute Force"
    category: Brute-Force
    severity: HIGH
    confidence: 0.87
    conditions:
      - { field: dst_port, op: "==", value: 22 }
      - { field: pkt_count, op: ">", value: 50 }
      - { field: flow_pkts_per_sec, op: ">", value: 10 }

  - id: BRUTE-002
    name: "FTP Brute Force"
    category: Brute-Force
    severity: HIGH
    confidence: 0.85
    conditions:
      - { field: dst_port, op: "==", value: 21 }
      - { field: pkt_count, op: ">", value: 30 }
      - { field: rst_flag_count, op: ">", value: 5 }

  - id: BRUTE-003
    name: "HTTP Brute Force (Login)"
    category: Brute-Force
    severity: MEDIUM
    confidence: 0.78
    conditions:
      - { field: dst_port, op: "==", value: 80 }
      - { field: pkt_count, op: ">", value: 100 }
      - { field: flow_bytes_per_sec, op: "<", value: 1000 }

  # ── Suspicious Flags ───────────────────────────────────────────────────────

  - id: MISC-001
    name: "URG Flag Anomaly"
    category: Misc
    severity: MEDIUM
    confidence: 0.72
    conditions:
      - { field: urg_flag_count, op: ">", value: 10 }

  - id: MISC-002
    name: "RST Storm"
    category: Misc
    severity: MEDIUM
    confidence: 0.76
    conditions:
      - { field: rst_flag_count, op: ">", value: 50 }
      - { field: flow_pkts_per_sec, op: ">", value: 100 }

  # ═══════════════════════════════════════════════════════════════════════════
  # CROSS-SITE SCRIPTING (XSS) ATTACKS
  # ═══════════════════════════════════════════════════════════════════════════

  - id: XSS-001
    name: "Reflected XSS via Query Parameter"
    category: Injection
    severity: HIGH
    confidence: 0.91
    conditions:
      - { field: url_param_xss, op: "==", value: true }
      - { field: http_method, op: "==", value: "GET" }

  - id: XSS-002
    name: "Stored XSS via POST Body"
    category: Injection
    severity: HIGH
    confidence: 0.90
    conditions:
      - { field: post_body_xss, op: "==", value: true }
      - { field: http_method, op: "==", value: "POST" }

  - id: XSS-003
    name: "DOM-Based XSS Attempt"
    category: Injection
    severity: HIGH
    confidence: 0.85
    conditions:
      - { field: url_fragment_xss, op: "==", value: true }
      - { field: http_method, op: "==", value: "GET" }

  - id: XSS-004
    name: "XSS via HTTP Header"
    category: Injection
    severity: HIGH
    confidence: 0.88
    conditions:
      - { field: any_header_xss, op: "==", value: true }
      - { field: http_method, op: "!=", value: "" }

  - id: XSS-005
    name: "Unicode Encoding XSS Bypass"
    category: Injection
    severity: MEDIUM
    confidence: 0.80
    conditions:
      - { field: unicode_xss_payload, op: "==", value: true }
      - { field: http_method, op: "!=", value: "" }

  - id: XSS-006
    name: "XSS with Event Handler"
    category: Injection
    severity: HIGH
    confidence: 0.89
    conditions:
      - { field: event_handler_xss, op: "==", value: true }
      - { field: http_method, op: "!=", value: "" }

  # ═══════════════════════════════════════════════════════════════════════════
  # SQL INJECTION ATTACKS
  # ═══════════════════════════════════════════════════════════════════════════

  - id: SQLI-001
    name: "SQL Injection via Query Parameter"
    category: Injection
    severity: CRITICAL
    confidence: 0.95
    conditions:
      - { field: url_param_sqli, op: "==", value: true }
      - { field: http_method, op: "==", value: "GET" }

  - id: SQLI-002
    name: "SQL Injection via POST Body"
    category: Injection
    severity: CRITICAL
    confidence: 0.94
    conditions:
      - { field: post_body_sqli, op: "==", value: true }
      - { field: http_method, op: "==", value: "POST" }

  - id: SQLI-003
    name: "Blind SQL Injection Attempt"
    category: Injection
    severity: HIGH
    confidence: 0.88
    conditions:
      - { field: blind_sqli_pattern, op: "==", value: true }
      - { field: http_method, op: "!=", value: "" }

  - id: SQLI-004
    name: "Union-Based SQL Injection"
    category: Injection
    severity: CRITICAL
    confidence: 0.93
    conditions:
      - { field: union_sqli_pattern, op: "==", value: true }
      - { field: http_method, op: "!=", value: "" }

  - id: SQLI-005
    name: "Time-Based Blind SQL Injection"
    category: Injection
    severity: HIGH
    confidence: 0.86
    conditions:
      - { field: time_sqli_pattern, op: "==", value: true }
      - { field: response_time_abnormal, op: "==", value: true }

  - id: SQLI-006
    name: "Error-Based SQL Injection"
    category: Injection
    severity: HIGH
    confidence: 0.89
    conditions:
      - { field: error_sqli_pattern, op: "==", value: true }
      - { field: http_response_code, op: "==", value: 500 }

  # ═══════════════════════════════════════════════════════════════════════════
  # COMMAND INJECTION ATTACKS
  # ═══════════════════════════════════════════════════════════════════════════

  - id: CMDI-001
    name: "OS Command Injection via Query Parameter"
    category: Injection
    severity: CRITICAL
    confidence: 0.95
    conditions:
      - { field: url_param_cmdi, op: "==", value: true }
      - { field: http_method, op: "==", value: "GET" }

  - id: CMDI-002
    name: "OS Command Injection via POST Body"
    category: Injection
    severity: CRITICAL
    confidence: 0.94
    conditions:
      - { field: post_body_cmdi, op: "==", value: true }
      - { field: http_method, op: "==", value: "POST" }

  - id: CMDI-003
    name: "Shell Metacharacter Injection"
    category: Injection
    severity: HIGH
    confidence: 0.88
    conditions:
      - { field: shell_metachar_pattern, op: "==", value: true }
      - { field: http_method, op: "!=", value: "" }

  - id: CMDI-004
    name: "Blind Command Injection (Time-Based)"
    category: Injection
    severity: HIGH
    confidence: 0.85
    conditions:
      - { field: blind_cmdi_pattern, op: "==", value: true }
      - { field: response_time_abnormal, op: "==", value: true }

  # ═══════════════════════════════════════════════════════════════════════════
  # PATH TRAVERSAL / LOCAL FILE INCLUSION (LFI)
  # ═══════════════════════════════════════════════════════════════════════════

  - id: LFI-001
    name: "Path Traversal via URL Parameter"
    category: Injection
    severity: HIGH
    confidence: 0.92
    conditions:
      - { field: path_traversal_pattern, op: "==", value: true }
      - { field: http_method, op: "==", value: "GET" }

  - id: LFI-002
    name: "Local File Inclusion via POST"
    category: Injection
    severity: HIGH
    confidence: 0.90
    conditions:
      - { field: lfi_pattern, op: "==", value: true }
      - { field: http_method, op: "==", value: "POST" }

  - id: LFI-003
    name: "Null Byte Injection in File Path"
    category: Injection
    severity: HIGH
    confidence: 0.88
    conditions:
      - { field: null_byte_pattern, op: "==", value: true }
      - { field: http_method, op: "!=", value: "" }

  - id: LFI-004
    name: "Double URL-Encoded Path Traversal"
    category: Injection
    severity: HIGH
    confidence: 0.87
    conditions:
      - { field: double_encoded_traversal, op: "==", value: true }
      - { field: http_method, op: "!=", value: "" }

  # ═══════════════════════════════════════════════════════════════════════════
  # SERVER-SIDE REQUEST FORGERY (SSRF)
  # ═══════════════════════════════════════════════════════════════════════════

  - id: SSRF-001
    name: "SSRF via URL Parameter (Internal IP)"
    category: Injection
    severity: CRITICAL
    confidence: 0.93
    conditions:
      - { field: ssrf_internal_ip, op: "==", value: true }
      - { field: http_method, op: "!=", value: "" }

  - id: SSRF-002
    name: "SSRF via Cloud Metadata Endpoint"
    category: Injection
    severity: CRITICAL
    confidence: 0.97
    conditions:
      - { field: ssrf_metadata_endpoint, op: "==", value: true }
      - { field: http_method, op: "!=", value: "" }

  - id: SSRF-003
    name: "SSRF via DNS Rebinding"
    category: Injection
    severity: HIGH
    confidence: 0.85
    conditions:
      - { field: ssrf_dns_rebind, op: "==", value: true }
      - { field: redirect_external, op: "==", value: true }

  - id: SSRF-004
    name: "SSRF via Localhost / Loopback Reference"
    category: Injection
    severity: CRITICAL
    confidence: 0.95
    conditions:
      - { field: ssrf_loopback_ref, op: "==", value: true }
      - { field: http_method, op: "!=", value: "" }

  # ═══════════════════════════════════════════════════════════════════════════
  # HTTP METHOD ABUSE
  # ═══════════════════════════════════════════════════════════════════════════

  - id: HTTP-ABUSE-001
    name: "Suspicious HTTP Method (TRACE/TRACK)"
    category: Anomaly
    severity: MEDIUM
    confidence: 0.82
    conditions:
      - { field: http_method_trace, op: "==", value: true }

  - id: HTTP-ABUSE-002
    name: "HTTP CONNECT Tunnelling Attempt"
    category: Anomaly
    severity: HIGH
    confidence: 0.88
    conditions:
      - { field: http_method_connect, op: "==", value: true }
      - { field: dst_port, op: "!=", value: 443 }

  - id: HTTP-ABUSE-003
    name: "Oversized HTTP Header"
    category: Anomaly
    severity: MEDIUM
    confidence: 0.78
    conditions:
      - { field: http_header_size, op: ">", value: 8192 }
      - { field: http_method, op: "!=", value: "" }

  - id: HTTP-ABUSE-004
    name: "HTTP Request Smuggling Attempt"
    category: Anomaly
    severity: CRITICAL
    confidence: 0.90
    conditions:
      - { field: transfer_encoding_anomaly, op: "==", value: true }
      - { field: content_length_anomaly, op: "==", value: true }

  # ═══════════════════════════════════════════════════════════════════════════
  # DATA EXFILTRATION
  # ═══════════════════════════════════════════════════════════════════════════

  - id: EXFIL-001
    name: "Large Outbound Data Transfer"
    category: Exfiltration
    severity: HIGH
    confidence: 0.85
    conditions:
      - { field: bwd_byte_count, op: ">", value: 5000000 }
      - { field: duration, op: ">", value: 30000 }

  - id: EXFIL-002
    name: "DNS Tunnelling (High Query Volume)"
    category: Exfiltration
    severity: HIGH
    confidence: 0.88
    conditions:
      - { field: dst_port, op: "==", value: 53 }
      - { field: pkt_count, op: ">", value: 300 }
      - { field: avg_pkt_size, op: ">", value: 200 }

  - id: EXFIL-003
    name: "Repeated Outbound HTTPS to Rare Destination"
    category: Exfiltration
    severity: MEDIUM
    confidence: 0.76
    conditions:
      - { field: dst_port, op: "==", value: 443 }
      - { field: rare_destination, op: "==", value: true }
      - { field: bwd_byte_count, op: ">", value: 1000000 }

  - id: EXFIL-004
    name: "ICMP Data Exfiltration (Large ICMP Payload)"
    category: Exfiltration
    severity: HIGH
    confidence: 0.83
    conditions:
      - { field: protocol_type, op: "==", value: 1 }
      - { field: avg_pkt_size, op: ">", value: 500 }
      - { field: byte_count, op: ">", value: 100000 }

  # ═══════════════════════════════════════════════════════════════════════════
  # ADDITIONAL BRUTE-FORCE RULES
  # ═══════════════════════════════════════════════════════════════════════════

  - id: BRUTE-004
    name: "RDP Brute Force"
    category: Brute-Force
    severity: HIGH
    confidence: 0.88
    conditions:
      - { field: dst_port, op: "==", value: 3389 }
      - { field: pkt_count, op: ">", value: 40 }
      - { field: flow_pkts_per_sec, op: ">", value: 8 }

  - id: BRUTE-005
    name: "SMTP Brute Force / Credential Stuffing"
    category: Brute-Force
    severity: MEDIUM
    confidence: 0.80
    conditions:
      - { field: dst_port, op: "==", value: 25 }
      - { field: pkt_count, op: ">", value: 50 }
      - { field: rst_flag_count, op: ">", value: 5 }

  - id: BRUTE-006
    name: "HTTPS Login Brute Force"
    category: Brute-Force
    severity: MEDIUM
    confidence: 0.79
    conditions:
      - { field: dst_port, op: "==", value: 443 }
      - { field: pkt_count, op: ">", value: 100 }
      - { field: flow_bytes_per_sec, op: "<", value: 1500 }

  - id: BRUTE-007
    name: "Telnet Brute Force"
    category: Brute-Force
    severity: HIGH
    confidence: 0.86
    conditions:
      - { field: dst_port, op: "==", value: 23 }
      - { field: pkt_count, op: ">", value: 30 }
      - { field: flow_pkts_per_sec, op: ">", value: 10 }
